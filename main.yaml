    - priority: -100
      then:
        - lambda: |-
            id(mqtt_client).subscribe(App.get_name() + "/ir_send", [=](const std::string &topic, const std::string &payload) {
            id(txv)={};
            DynamicJsonDocument json_document(JSON_ARRAY_SIZE(payload.size() / 5));
            deserializeJson(json_document, payload);
            JsonArray root = json_document.as<JsonArray>();
            int s = -1;
            for(auto value : root) {
                s *= -1;
                id(txv).push_back(value.as<int>() * s);
            }
            id(irsend).press();
            });
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO4
      inverted: true
      mode:
        input: true
        pullup: true
    name: "GPIO4"
    device_class: window


interval:
  - interval: 5000ms
    then:
      - lambda: |-
          static int last_state = 0;  // 0:正常, 1:WiFi断开, 2:MQTT断开
          
          // 修正：使用 WiFi.is_connected() 而不是 WiFi

          bool wifi_ok = id(my_wifi).is_connected();
          //bool wifi_ok = wifi->is_connected();
          bool mqtt_ok = id(mqtt_client).is_connected();
          
          int current_state = 0;
          if (!wifi_ok) current_state = 1;
          else if (!mqtt_ok) current_state = 2;
          
          if (current_state != last_state) {
            last_state = current_state;
            
            if (current_state == 0) {
              // 正常状态，关闭灯光
              id(light1).turn_off().perform();
              ESP_LOGD("status", "All connected, turning off light");
            } 
            else if (current_state == 1) {
              // WiFi 断开
              auto call = id(light1).turn_on();
              call.set_effect("Strobe_Effect1");
              call.perform();
              ESP_LOGW("status", "WiFi disconnected! Showing effect");
            } 
            else if (current_state == 2) {
              // MQTT 断开
              auto call = id(light1).turn_on();
              call.set_effect("Strobe_Effect2");
              call.perform();
              ESP_LOGW("status", "MQTT disconnected! Showing effect");
            }
          }